# chadmux Theme
set -g status-interval 1
set -g status-left-length 100

set -g status-left "#{?pane_in_mode,#[bold fg=color0]#[bg=color1]  COPY #[fg=color1 bg=color11],#{?window_zoomed_flag,#[bold fg=color0]#[bg=color8]  ZOOM #[fg=color8 bg=color11],#{?client_prefix,#[bold fg=color0]#[bg=color5]  CMND #[fg=color5 bg=color11],#[bold fg=color0]#[bg=color15]  TMUX #[fg=color15 bg=color11]}}}"

set -ag status-left "#[fg=color11 bg=color1]"

# Agregar el nombre de la sesión
set -ag status-left "#[fg=color10 bg=color1]  #(basename $SHELL) #[fg=color1 bg=color1]"
set -ag status-left "#[fg=color1 bg=color6]"

set -ag status-left "#[fg=color0 bg=color6]  #S #{}"
set -ag status-left "#[fg=color6 bg=color0]"

set -ag status-left "#[bg=color0] "





set -g status-right "#[fg=color15] #{pane_current_command} "

# TIME
set -ag status-right "#[fg=color6]#[fg=color0 bg=color6]󰥔 #[fg=color6 bg=color0] %H:%M #{}"

set -g status-bg color0
set -g status-fg color11

set -g pane-active-border-style "fg=color2"
set -g pane-border-style "fg=color0"

# Window inactives
set -g window-status-format "#[default]#{window_index} #{b:pane_current_path}"

# Window active
set -g window-status-current-format "#[fg=color0 bg=color4]#[bold fg=color0 bg=color4] #{window_index} #{b:pane_current_path} #[fg=color4 bg=color0]"

# Pane border
setw -g pane-border-status bottom
set -g pane-border-format "#[align=centre]#{?pane_active,#[bold],#[fg=black,bg=default]} #{pane_index} • #{?pane_active,#[bold],#[fg=black,bg=default]}#{pane_current_command} "
setw -g pane-border-lines single



# =========================================================
# Prefix & Core Behavior
# =========================================================

# Set Alt (Meta) as prefix (Alt+s)
set -g prefix M-s

# Enable mouse support
set -g mouse on

# Start window numbering at 1 instead of 0
set -g base-index 1

# Start pane numbering at 1 instead of 0
set -g pane-base-index 1

# Renumber windows automatically when one closes
set -g renumber-windows on

# Allow copying to system clipboard
set -g set-clipboard on

# Allows terminal escape sequences to pass through
set -g allow-passthrough on

# Pane resizes immediately when switching windows
setw -g aggressive-resize on

# =========================================================
# Reload Config
# =========================================================
bind-key q source-file ~/.config/tmux/tmux.conf


# =========================================================
# Pane Navigation (Vim-style)
# =========================================================

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Direct pane navigation without prefix
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D


# =========================================================
# Pane Resizing
# =========================================================

bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Right resize-pane -R 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Down resize-pane -D 5


# =========================================================
# Pane Management
# =========================================================

# Horizontal split
bind v split-window -h -c "#{pane_current_path}"

# Vertical split
bind h split-window -v -c "#{pane_current_path}"

# Kill pane
bind x kill-pane


# =========================================================
# Copy Mode (Vim)
# =========================================================

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


# =========================================================
# Window Management
# =========================================================

# Create window in current path
bind c new-window -c "#{pane_current_path}"

# Rename window
bind r command-prompt -I "#W" "rename-window -- '%%'"

# Kill window
bind k kill-window


# ---------------------------------------------------------
# Direct Window Selection (Alt + Number)
# ---------------------------------------------------------

bind-key -n M-1 selectw -t 1
bind-key -n M-2 selectw -t 2
bind-key -n M-3 selectw -t 3
bind-key -n M-4 selectw -t 4
bind-key -n M-5 selectw -t 5
bind-key -n M-6 selectw -t 6
bind-key -n M-7 selectw -t 7
bind-key -n M-8 selectw -t 8
bind-key -n M-9 selectw -t 9
bind-key -n M-0 selectw -t 10


# ---------------------------------------------------------
# Window Navigation
# ---------------------------------------------------------

bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1


# ---------------------------------------------------------
# Window Reordering
# ---------------------------------------------------------

bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1


# =========================================================
# Session Management
# =========================================================

# Rename session
bind R command-prompt -I "#S" "rename-session -- '%%'"

# Create new session
bind C new-session -c "#{pane_current_path}"

# Kill session
bind K kill-session

# Previous session
bind P switch-client -p

# Next session
bind N switch-client -n



# =========================================================
# THEME CONFIGURATION
# =========================================================

#------------------------------------------Theme 1-------------------------------------------------------


# Source generated theme
if-shell "test -f ~/.config/tmux/matugen.conf" "source-file ~/.config/tmux/matugen.conf"



[preferred]
# Use KDE as the primary fallback, then GNOME, then GTK
default = kde;gnome;gtk
# Explicitly set KDE for the most common tasks
org.freedesktop.impl.portal.ScreenCast = kde;gnome
org.freedesktop.impl.portal.Screenshot = kde;gnome
org.freedesktop.impl.portal.FileChooser = kde;gtk
org.freedesktop.impl.portal.Access = kde;gtk
org.freedesktop.impl.portal.Notification = kde;gtk
